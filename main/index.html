<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Styling -->
    <link rel="stylesheet" href="style.css"></head>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main">
        <div class="background-image"></div>
        <img class="top-banner" src="static/top-banner.png">

        <!-- Team Name -->
        <div class="team-name red-team-name">Long team name here</div>
        <div class="team-name blue-team-name">Long team name here</div>

        <!-- Stars -->
        <div class="star-container red-star-container">
            <div class="star-wrapper">
                <img src="static/stars/star-full.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-full.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-full.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-full.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-empty.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-empty.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-empty.png">
            </div>
        </div>
        <div class="star-container blue-star-container">
            <div class="star-wrapper">
                <img src="static/stars/star-full.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-full.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-full.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-full.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-empty.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-empty.png">
            </div>
            <div class="star-wrapper">
                <img src="static/stars/star-empty.png">
            </div>
        </div>

        <!-- Round Name -->
        <img class="round-name-background" src="static/round-name-background.png">
        <div class="round-name-text">Quarterfinals</div>

        <!-- Gameplay -->
        <img class="gameplay-border" src="static/gameplay-border.png">
        <div class="gameplay-background"></div>
        <div class="gameplay-border-inner gameplay-border-inner-left"></div>
        <div class="gameplay-border-inner gameplay-border-inner-right"></div>

        <!-- Bottom Score Section -->
        <img class="bottom-triangle" src="static/bottom-score-background/bottom-triangle.png">
        <img class="bottom-score-section" src="static/bottom-score-background/bottom-score-border.png">

        <!-- Bottom Score Gradient -->
        <img class="bottom-score-gradient bottom-score-gradient-right" src="static/bottom-score-gradient/bottom-score-gradient-right.png">
        <img class="bottom-score-gradient bottom-score-gradient-left" src="static/bottom-score-gradient/bottom-score-gradient-left.png">

        <!-- Score Bar -->
        <img class="score-bar-leaf" src="static/score-difference-leaf.png">
        <div class="score-bar-line score-bar-line-left"></div>
        <div class="score-bar-line score-bar-line-right"></div>

        <!-- Score Differnce -->
        <div class="score-difference">999,999,999</div>

        <!-- Scores -->
        <div class="score score-left">999,999,999</div>
        <div class="score score-right">999,999,999</div>

        <!-- Now Playing Circle -->
        <div class="invisible-section"></div>
        <div class="now-playing-bg"></div>
        <img class="now-playing-circle" src="static/now-playing/now-playing-circle.png">

        <!-- Now Playing Details -->
        <div class="now-playing-details">
            <img class="now-playing-rectangle" src="static/now-playing/now-playing-rectangle.png">
            <div class="now-playing-data-left now-playing-title-difficulty"><span id="now-playing-title">TITLE</span> <span id="now-playing-difficulty">[DIFFICULTY]</span></div>
            <div class="now-playing-data-left now-playing-artist">Artist</div>
            <img class="now-playing-data-left now-playing-stem" src="static/now-playing/now-playing-stem.png">
            <div class="now-playing-data-left now-playing-stats">
                <div>SR: <span id="now-playing-sr">9.99</span>*</div>
                <div>CS: <span id="now-playing-sr">9.9</span></div>
                <div>BPM: <span id="now-playing-sr">999</span></div>
                <div>AR: <span id="now-playing-sr">10</span></div>
                <div>OD: <span id="now-playing-sr">9.9</span></div>
                <div>LEN: <span id="now-playing-sr">9999</span></div>
            </div>
        </div>
    </div>
</body>
</html>
