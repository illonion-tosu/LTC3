<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Styling -->
    <link rel="stylesheet" href="../_shared/css/common.css">
    <link rel="stylesheet" href="../_shared/css/gameplay-mappool.css">
    <link rel="stylesheet" href="style.css"></head>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script src="../_shared/deps/reconnecting-websocket.min.js"></script>
    <script src="../_shared/deps/countUp.js"></script>
</head>
<body>
    <video autoplay loop muted>
        <source src="static/background.mp4">
    </video>

    <div class="main">
        <img class="top-banner" src="static/top-banner.png">

        <!-- Team Name -->
        <div class="team-name red-team-name" id="red-team-name"></div>
        <div class="team-name blue-team-name" id="blue-team-name"></div>

        <!-- Stars -->
        <div class="star-container red-star-container" id="red-team-star-container"></div>
        <div class="star-container blue-star-container" id="blue-team-star-container"></div>

        <!-- Round Name -->
        <img class="round-name-background" src="static/round-name-background.png">
        <div class="round-name-text" id="round-name-text"></div>

        <!-- Gameplay -->
        <img class="gameplay-border" src="static/gameplay-border.png">
        <div class="gameplay-border-inner gameplay-border-inner-left"></div>
        <div class="gameplay-border-inner gameplay-border-inner-right"></div>

        <section id="score-section">
            <!-- Bottom Score Section -->
            <img class="bottom-score-background" id="bottom-score-background" src="static/bottom-score-background/blue-winning-background.png">
            <img class="bottom-score-section" src="static/bottom-score-background/bottom-score-border.png">

            <!-- Bottom Score Gradient -->
            <img class="bottom-score-gradient bottom-score-gradient-right" src="static/bottom-score-gradient/bottom-score-gradient-right.png">
            <img class="bottom-score-gradient bottom-score-gradient-left" src="static/bottom-score-gradient/bottom-score-gradient-left.png">
            
            <!-- Score Bar -->
            <img class="score-bar-leaf" src="static/score-difference-leaf.png">
            <div class="score-bar-line score-bar-line-left" id="score-bar-line-left"></div>
            <div class="score-bar-line score-bar-line-right" id="score-bar-line-right"></div>

            <!-- Score Differnce -->
            <div class="score-difference" id="score-difference"></div>
            <div class="score-difference" id="score-difference-combo"></div>
            <div class="score-difference" id="score-difference-miss"></div>
            <div class="score-difference" id="score-difference-acc"></div>

            <!-- Scores -->
            <div class="score red-score" id="red-score"></div>
            <div class="score blue-score" id="blue-score"></div>
            <div class="score red-score" id="red-score-combo"></div>
            <div class="score blue-score" id="blue-score-combo"></div>
            <div class="score red-score" id="red-score-miss"></div>
            <div class="score blue-score" id="blue-score-miss"></div>
            <div class="score red-score" id="red-score-acc"></div>
            <div class="score blue-score" id="blue-score-acc"></div>
        </section>

        <!-- Chat Display -->
        <div class="chat-display" id="chat-display">
            <div class="chat-display-background"></div>
            <div class="chat-display-container" id="chat-display-container"></div>
        </div>

        <!-- Now Playing Circle -->
        <div class="now-playing-bg" id="now-playing-bg"></div>
        <img class="now-playing-circle" src="static/now-playing/now-playing-circle.png">

        <!-- Now Playing Details -->
        <div class="now-playing-details">
            <img class="now-playing-rectangle" src="static/now-playing/now-playing-rectangle.png">
            <div class="now-playing-data-left now-playing-metadata now-playing-title-difficulty"><span id="now-playing-title">TITLE</span> [<span id="now-playing-difficulty">DIFFICULTY</span>]</div>
            <div class="now-playing-data-left now-playing-metadata now-playing-artist" id="now-playing-artist">Artist</div>
            <img class="now-playing-data-left now-playing-stem" src="static/now-playing/now-playing-stem.png">
            <div class="now-playing-data-left now-playing-stats">
                <div>SR: <span id="now-playing-sr">9.99</span>*</div>
                <div>CS: <span id="now-playing-cs">9.9</span></div>
                <div>BPM: <span id="now-playing-bpm">999</span></div>
                <div>AR: <span id="now-playing-ar">10</span></div>
                <div>OD: <span id="now-playing-od">9.9</span></div>
                <div>LEN: <span id="now-playing-len">9999</span></div>
            </div>
        </div>
    </div>

    <script src="index.js" type="module"></script>
</body>
</html>
