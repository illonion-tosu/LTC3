<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay</title>

    <!-- Styling -->
    <link rel="stylesheet" href="../_shared/css/common.css">
    <link rel="stylesheet" href="../_shared/css/gameplay-mappool.css">
    <link rel="stylesheet" href="style.css"></head>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

    <!-- Scripts -->
    <script src="../_shared/deps/reconnecting-websocket.min.js"></script>
</head>
<body>
    <video autoplay loop muted>
        <source src="static/background.mp4">
    </video>

    <div class="main">
        <!-- Main Background -->
        <div class="main-background"></div>

        <!-- Top Banner -->
        <img class="top-banner" src="../_shared/assets/top-banner.png">

        <!-- Round Name -->
        <img class="round-name-background" src="static/round-name-background.png">
        <div class="round-name" id="round-name">Round of 16</div>

        <!-- Team Section -->
        <div class="team-section left-team-section">
            <img class="team-section-overlay" src="static/team-section-overlay/red-team-section-overlay.png">
            <div class="team-name left-team-name" id="left-team-name">Long Team Name Hello Its</div>
            <img class="team-points-background" src="static/points-background.png">
            <div class="star-container red-star-container" id="red-star-container">
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-full.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-full.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-full.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-full.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-empty.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-empty.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-empty.png">
                </div>
            </div>
            <img class="team-ban-image" src="static/bans/red-ban.png">
            <div class="team-ban-container" id="left-team-ban-container"></div>
            <div class="team-pick-container left-team-pick-container" id="left-team-pick-container"></div>
        </div>
        <div class="team-section right-team-section">
            <img class="team-section-overlay" src="static/team-section-overlay/blue-team-section-overlay.png">
            <div class="team-name right-team-name" id="right-team-name">Long Team Name Hello Its</div>
            <img class="team-points-background" src="static/points-background.png">
            <div class="star-container red-star-container" id="blue-star-container">
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-full.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-full.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-full.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-full.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-empty.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-empty.png">
                </div>
                <div class="star-wrapper">
                    <img src="../_shared/assets/stars/star-empty.png">
                </div>
            </div>
            <img class="team-ban-image" src="static/bans/blue-ban.png">
            <div class="team-ban-container" id="right-team-ban-container"></div>
            <div class="team-pick-container right-team-pick-container" id="right-team-pick-container"></div>
        </div>

        <!-- Borders -->
        <img class="border-middle" src="static/border-middle.png">
        <div class="border top-border"></div>
        <div class="border middle-top-border"></div>
        <div class="border middle-bottom-border"></div>
        <div class="border bottom-border"></div>

        <!-- Chat Display -->
        <div class="chat-display" id="chat-display">
            <div class="chat-display-background"></div>
            <div class="chat-display-container" id="chat-display-container"></div>
        </div>
        <div class="chat-display" id="twitch-chat-display">
            <div class="chat-display-background"></div>
            <div class="chat-display-container" id="twitch-chat-display-container"></div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <section class="column column-1">
            <div class="sidebar-section">
                <div class="sidebar-title">Star Control</div>
                <div class="sidebar-button-container">
                    <button id="update-star-red-minus">Green --</button>
                    <button id="update-star-red-plus">Green ++</button>
                    <button id="update-star-blue-minus">Blue --</button>
                    <button id="update-star-blue-plus">Blue ++</button>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Mappool</div>
                <div class="sidebar-text">
                    Left Click (LC) = Green Pick<br>
                    Right Click (RC) = Blue Pick<br>
                    Ctrl + LC = Green Ban<br>
                    Ctrl + RC = Blue Ban
                 </div>
                <div class="sidebar-button-container" id="sidebar-mappool-container"></div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Next Picker</div>
                <div class="sidebar-text" id="next-auto-picker-team"></div>
                <div class="sidebar-button-container">
                    <button id="update-next-autopicker-red">Left</button>
                    <button id="update-next-autopicker-blue">Right</button>
                    <button class="full-length-button" id="toggle-autopick">Toggle Autopick: OFF</button>
                </div>
            </div>
        </section>
        <div class="divider"></div>
        <section class="column column-2">
            <div class="sidebar-section">
                <div class="sidebar-title">Set Star Status</div>
                <div class="sidebar-button-container">
                    <button class="full-length-button" id="toggle-stars">Toggle Stars: <span id="toggle-stars-text">ON</span></button>
                </div>
            </div>
            <div class="sidebar-section" id="mappool-management-system">
                <div class="sidebar-title">Mappool Management System</div>
                <div class="sidebar-text">
                    Only to be used in case<br>things go wrong!
                </div>
                <select class="sidebar-select" id="mappool-management-set-action" size="6">
                    <option value="setBan">Set Ban</option>
                    <option value="removeBan">Remove Ban</option>
                    <option value="setPick">Set Pick</option>
                    <option value="removePick">Remove Pick</option>
                    <option value="setWinner">Set Winner</option>
                    <option value="removeWinner">Remove Winner</option>
                </select>
            </div>
        </section>
    </div>

    <img class="preload-images" id="preload-images" src="">

    <script src="index.js" type="module"></script>
</body>
</html>
